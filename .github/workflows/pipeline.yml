name: Volusia Housing Pipeline

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SCHEMA: ${{ secrets.DB_SCHEMA }}
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mdbtools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion — tax roll
        run: python ingestion/ingest_tax_roll.py

      - name: Run ingestion — permits
        run: python ingestion/ingest_permits.py

      - name: Run ingestion — census
        run: python ingestion/ingest_census.py

      - name: Run ingestion — overdose
        run: python ingestion/ingest_overdose.py

      - name: Set up dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          volusia_housing:
            target: prod
            outputs:
              prod:
                type: postgres
                host: ${DB_HOST}
                port: ${DB_PORT}
                user: ${DB_USER}
                password: ${DB_PASSWORD}
                dbname: ${DB_NAME}
                schema: dev
                threads: 4
                sslmode: require
          EOF

      - name: Install dbt dependencies
        working-directory: volusia_housing
        run: dbt deps

      - name: Run dbt models
        working-directory: volusia_housing
        run: dbt run --target prod

      - name: Run dbt tests
        working-directory: volusia_housing
        run: dbt test --target prod